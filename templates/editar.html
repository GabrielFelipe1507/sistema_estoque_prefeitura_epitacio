<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Material</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .edit-container { max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .edit-container h2 { margin-bottom: 20px; color: #212529; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body style="display: block; background-color: #f4f6f9;">

    <div class="edit-container">
        <h2>✏️ Editar: {{ item.categoria }}</h2>
        
        <form method="POST">
            <div class="form-group">
                <label>Descrição / Cor:</label>
                <input type="text" name="descricao" value="{{ item.descricao }}" required>
            </div>

            <div class="form-group">
                <label>Nº Patrimônio:</label>
                <input type="text" name="patrimonio" value="{{ item.patrimonio or '' }}">
            </div>

            <div class="form-group">
                <label>Quantidade em Estoque:</label>
                <input type="number" name="quantidade" value="{{ item.quantidade }}" min="0" required>
            </div>

            <div class="form-group">
                <label>Marca:</label>
                <input type="text" name="marca" value="{{ item.marca or '' }}">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-success" style="width: 100%;">Salvar Alterações</button>
                <a href="{{ url_for('index', cat=item.categoria) }}" style="text-decoration: none; color: #666; padding: 10px;">Cancelar</a>
            </div>
        </form>
    </div>

</body>
</html>
