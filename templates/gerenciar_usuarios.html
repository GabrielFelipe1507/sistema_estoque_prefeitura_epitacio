<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="display: flex;">
    <main class="main-content">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <a href="/" class="btn-action"
                    style="background: #6c757d; color: white; padding: 10px 15px; text-decoration: none; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
                <h2 style="margin: 0;"><i class="fas fa-users-cog"></i> Gerenciar Usuários</h2>
            </div>
            <br>
            <form action="/salvar_usuario" method="POST" class="form-grid">
                <input type="hidden" name="user_id" id="user_id">
                <input type="text" name="nome" id="nome" placeholder="Nome Completo" required>
                <input type="email" name="email" id="email" placeholder="E-mail" required>
                <input type="password" name="senha" id="senha_user" placeholder="Nova Senha (deixe vazio para manter)">
                <button type="submit" class="btn-success">Salvar Usuário</button>
            </form>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Usuários Cadastrados</h3>
                <form method="GET" class="search-sidebar" style="padding: 0;">
                    <div class="input-group">
                        <i class="fas fa-search"></i>
                        <input type="text" name="search" placeholder="Pesquisar usuário..." value="{{ search }}">
                    </div>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>{{ u.nome }}</td>
                        <td>{{ u.email }}</td>
                        <td>
                            <button onclick="editarUser('{{ u.id }}', '{{ u.nome }}', '{{ u.email }}')"
                                class="btn-action btn-edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <a href="/excluir_usuario/{{ u.id }}" class="btn-action btn-delete"
                                onclick="return confirm('Excluir este usuário?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function editarUser(id, nome, email) {
            document.getElementById('user_id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('email').value = email;
            document.getElementById('senha_user').placeholder = "Nova senha (opcional)";
            window.scrollTo(0, 0);
        }
    </script>
</body>

</html>
